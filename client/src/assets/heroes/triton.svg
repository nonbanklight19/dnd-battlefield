<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="t-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <!-- Body gradient -->
    <linearGradient id="t-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <!-- Head gradient (blue-tinted skin) -->
    <radialGradient id="t-skin" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </radialGradient>
    <!-- Trident gradient -->
    <linearGradient id="t-trident" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Fin gradient -->
    <linearGradient id="t-fin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="122" rx="32" ry="6" fill="rgba(0,0,0,0.25)"/>

  <!-- Base -->
  <ellipse cx="50" cy="118" rx="28" ry="8" fill="url(#t-base)" stroke="#222" stroke-width="1"/>

  <!-- Legs -->
  <rect x="38" y="92" width="8" height="26" rx="2" fill="url(#t-armor)"/>
  <rect x="54" y="92" width="8" height="26" rx="2" fill="url(#t-armor)"/>

  <!-- Body / torso -->
  <rect x="33" y="55" width="34" height="40" rx="5" fill="url(#t-armor)"/>

  <!-- Scale pattern on torso -->
  <g opacity="0.2" stroke="#0e7490" stroke-width="0.5" fill="none">
    <path d="M38,62 Q42,60 46,62 Q50,64 54,62 Q58,60 62,62"/>
    <path d="M38,68 Q42,66 46,68 Q50,70 54,68 Q58,66 62,68"/>
    <path d="M38,74 Q42,72 46,74 Q50,76 54,74 Q58,72 62,74"/>
    <path d="M38,80 Q42,78 46,80 Q50,82 54,80 Q58,78 62,80"/>
    <path d="M38,86 Q42,84 46,86 Q50,88 54,86 Q58,84 62,86"/>
  </g>

  <!-- Shoulder pads -->
  <ellipse cx="30" cy="58" rx="8" ry="6" fill="url(#t-armor)" stroke="#0e7490" stroke-width="0.5"/>
  <ellipse cx="70" cy="58" rx="8" ry="6" fill="url(#t-armor)" stroke="#0e7490" stroke-width="0.5"/>

  <!-- Shoulder fins -->
  <path d="M22,52 L18,42 L26,50 Z" fill="url(#t-fin)" opacity="0.6"/>
  <path d="M78,52 L82,42 L74,50 Z" fill="url(#t-fin)" opacity="0.6"/>

  <!-- Arms -->
  <rect x="22" y="58" width="8" height="28" rx="3" fill="url(#t-armor)"/>
  <rect x="70" y="58" width="8" height="28" rx="3" fill="url(#t-armor)"/>

  <!-- Forearm fins -->
  <path d="M20,70 L16,64 L22,68 Z" fill="url(#t-fin)" opacity="0.5"/>
  <path d="M80,70 L84,64 L78,68 Z" fill="url(#t-fin)" opacity="0.5"/>

  <!-- Trident handle -->
  <line x1="78" y1="14" x2="76" y2="110" stroke="#0891b2" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="14" x2="76" y2="110" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Trident head (3 prongs) -->
  <g fill="url(#t-trident)" stroke="#0891b2" stroke-width="0.5">
    <!-- Center prong -->
    <polygon points="78,4 76,18 80,18"/>
    <!-- Left prong -->
    <polygon points="70,10 74,20 77,18"/>
    <!-- Right prong -->
    <polygon points="86,10 82,20 79,18"/>
    <!-- Cross bar -->
    <rect x="72" y="18" width="14" height="3" rx="1" fill="#0891b2"/>
  </g>

  <!-- Neck -->
  <rect x="45" y="48" width="10" height="8" rx="2" fill="url(#t-skin)"/>

  <!-- Head -->
  <circle cx="50" cy="40" r="12" fill="url(#t-skin)"/>

  <!-- Head fin/crest -->
  <path d="M50,28 L46,22 L50,18 L54,22 Z" fill="url(#t-fin)" opacity="0.7"/>

  <!-- Eyes -->
  <ellipse cx="45" cy="39" rx="2" ry="1.8" fill="#0c4a6e"/>
  <circle cx="45" cy="39" r="1" fill="#0f172a"/>
  <ellipse cx="55" cy="39" rx="2" ry="1.8" fill="#0c4a6e"/>
  <circle cx="55" cy="39" r="1" fill="#0f172a"/>

  <!-- Gills on cheeks -->
  <g stroke="#0891b2" stroke-width="0.8" opacity="0.5">
    <line x1="37" y1="40" x2="39" y2="42"/>
    <line x1="37" y1="42" x2="39" y2="44"/>
    <line x1="37" y1="44" x2="39" y2="46"/>
    <line x1="63" y1="40" x2="61" y2="42"/>
    <line x1="63" y1="42" x2="61" y2="44"/>
    <line x1="63" y1="44" x2="61" y2="46"/>
  </g>

  <!-- Mouth -->
  <path d="M46,45 Q50,47 54,45" stroke="#0e7490" stroke-width="0.8" fill="none"/>
</svg>
