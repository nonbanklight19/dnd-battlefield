<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <defs>
    <!-- Base gradient -->
    <linearGradient id="wz-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <!-- Robe gradient -->
    <linearGradient id="wz-robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Head gradient -->
    <radialGradient id="wz-skin" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#e8c9a0"/>
      <stop offset="100%" stop-color="#c9a87a"/>
    </radialGradient>
    <!-- Hat gradient -->
    <linearGradient id="wz-hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Orb glow -->
    <radialGradient id="wz-orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>
    <!-- Orb outer glow -->
    <radialGradient id="wz-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="122" rx="32" ry="6" fill="rgba(0,0,0,0.25)"/>

  <!-- Base -->
  <ellipse cx="50" cy="118" rx="28" ry="8" fill="url(#wz-base)" stroke="#222" stroke-width="1"/>

  <!-- Robe body (wider at bottom like a robe/dress) -->
  <polygon points="35,60 28,118 72,118 65,60" fill="url(#wz-robe)" stroke="#1d4ed8" stroke-width="0.5"/>

  <!-- Robe folds -->
  <line x1="42" y1="70" x2="38" y2="118" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="70" x2="62" y2="118" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="65" x2="50" y2="118" stroke="#1e40af" stroke-width="0.8" opacity="0.4"/>

  <!-- Arms/sleeves -->
  <polygon points="35,62 22,80 28,82 38,68" fill="url(#wz-robe)"/>
  <polygon points="65,62 78,80 72,82 62,68" fill="url(#wz-robe)"/>

  <!-- Staff -->
  <line x1="76" y1="20" x2="72" y2="115" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="20" x2="72" y2="115" stroke="#a07828" stroke-width="2" stroke-linecap="round"/>

  <!-- Orb glow effect (outer) -->
  <circle cx="77" cy="18" r="12" fill="url(#wz-glow)"/>

  <!-- Orb -->
  <circle cx="77" cy="18" r="6" fill="url(#wz-orb)"/>
  <!-- Orb highlight -->
  <circle cx="75" cy="16" r="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Sparkle near orb -->
  <g fill="#bfdbfe" opacity="0.8">
    <polygon points="68,12 69,14 68,16 67,14" />
    <polygon points="66,13 68,14 66,15 64,14" />
  </g>

  <!-- Neck -->
  <rect x="46" y="48" width="8" height="6" rx="2" fill="url(#wz-skin)"/>

  <!-- Head -->
  <circle cx="50" cy="42" r="10" fill="url(#wz-skin)"/>

  <!-- Eyes -->
  <circle cx="46" cy="41" r="1.2" fill="#333"/>
  <circle cx="54" cy="41" r="1.2" fill="#333"/>

  <!-- Beard (small) -->
  <path d="M44,46 Q50,56 56,46" fill="#aaa" opacity="0.6"/>

  <!-- Pointed hat -->
  <polygon points="50,8 36,38 64,38" fill="url(#wz-hat)" stroke="#1e3a8a" stroke-width="0.5"/>
  <!-- Hat brim -->
  <ellipse cx="50" cy="38" rx="16" ry="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="0.5"/>
  <!-- Hat band -->
  <rect x="38" y="35" width="24" height="3" rx="1" fill="#fbbf24" opacity="0.7"/>
  <!-- Star on hat -->
  <polygon points="50,18 51.5,22 55.5,22 52.5,24.5 53.5,28.5 50,26 46.5,28.5 47.5,24.5 44.5,22 48.5,22" fill="#fbbf24" opacity="0.6" transform="scale(0.7) translate(21,10)"/>
</svg>
